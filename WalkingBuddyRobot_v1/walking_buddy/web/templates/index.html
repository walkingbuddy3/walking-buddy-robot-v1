<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ app_name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="container">
        <h1>{{ app_name }}</h1>
        <p class="subtitle">Safe control panel for the first Walking Buddy robot prototype.</p>

        <section class="card">
            <h2>Robot Controls</h2>
            <div class="grid">
                <button onclick="moveRobot('forward')">Forward</button>
                <button onclick="moveRobot('left')">Left</button>
                <button onclick="moveRobot('stop')" class="stop">Stop</button>
                <button onclick="emergencyStop()" class="emergency">EMERGENCY STOP</button>
                <button onclick="captureCamera()">Capture Camera</button>
                <button onclick="moveRobot('right')">Right</button>
                <button onclick="moveRobot('backward')">Backward</button>
            </div>
            <p id="status">Ready.</p>
            <p><strong>Obstacle Status:</strong> <span id="obstacle-status">Not analyzed yet.</span></p>
        </section>

        <section class="card">
            <h2>Camera Feed</h2>
            <img id="latest-camera-image"
     src="/api/camera/latest"
     class="video"
     alt="Latest Walking Buddy camera capture">
     <p><strong>Detected Objects:</strong> <span id="detected-objects">Not detected yet.</span></p>
        </section>

        <section class="card">
            <h2>Voice Test</h2>
            <button onclick="sayHello()">Say Hello</button>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
